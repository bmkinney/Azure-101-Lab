<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="810" viewBox="0 0 1200 810" role="img" aria-labelledby="title desc">
  <title id="title">Azure 101 Lab v2 topology preview</title>
  <desc id="desc">Preview diagram showing two resource groups: a learner resource group with a VNet, subnets, Ubuntu VM, NIC, NSG, route table, and storage account with intentional faults; and a shared resource group with Log Analytics workspace, data collection rule, and managed identity.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b5fc7" />
    </marker>
    <style>
      text { font-family: Segoe UI, Arial, sans-serif; fill: #1f1f1f; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #605e5c; }
      .section { font-size: 20px; font-weight: 700; fill: #005a9e; }
      .label { font-size: 16px; font-weight: 700; }
      .small { font-size: 14px; fill: #323130; }
      .tiny { font-size: 12px; fill: #605e5c; }
      .fault { font-size: 11px; fill: #d13438; font-style: italic; font-weight: 600; }
      .edge { stroke: #0078d4; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .edge-soft { stroke: #7a7574; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .rg { fill: none; stroke: #8a8886; stroke-width: 2.25; stroke-dasharray: 10 6; }
      .vnet { fill: #f8fbff; stroke: #0078d4; stroke-width: 2.5; }
      .sub { fill: #ffffff; stroke: #b3b0ad; stroke-width: 1.5; stroke-dasharray: 6 4; }
      .card { fill: #ffffff; stroke: #d2d0ce; stroke-width: 1.25; }
    </style>
  </defs>

  <rect width="1200" height="810" fill="#ffffff" />
  <text x="600" y="46" text-anchor="middle" class="title">Azure 101 Lab v2 Topology</text>
  <text x="600" y="70" text-anchor="middle" class="subtitle">Pre-created sandbox subscription with learner and shared resource groups</text>

  <!-- Learner Resource Group -->
  <rect x="40" y="92" width="1120" height="456" rx="24" class="rg" />
  <text x="78" y="120" class="section">Learner Resource Group</text>
  <text x="78" y="138" class="tiny">rg-{name}-xylem-lab</text>

  <!-- Virtual Network -->
  <rect x="70" y="156" width="635" height="364" rx="20" class="vnet" />
  <text x="108" y="184" class="label" fill="#4b3fa8">Virtual Network</text>
  <text x="108" y="200" class="tiny">10.0.0.0/16</text>

  <!-- Management Subnet -->
  <rect x="100" y="222" width="270" height="270" rx="16" class="sub" />
  <text x="128" y="250" class="label" fill="#2b579a">Management Subnet</text>
  <text x="128" y="266" class="tiny">10.0.0.0/24</text>
  <rect x="118" y="290" width="234" height="70" rx="10" class="card" />
  <text x="235" y="318" text-anchor="middle" class="small">Reserved for management</text>
  <text x="235" y="338" text-anchor="middle" class="small">and validation exercises</text>

  <!-- Workload Subnet -->
  <rect x="395" y="222" width="280" height="270" rx="16" class="sub" />
  <text x="423" y="250" class="label" fill="#0b6a0b">Workload Subnet</text>
  <text x="423" y="266" class="tiny">10.0.1.0/24</text>

  <!-- NIC -->
  <rect x="415" y="284" width="240" height="50" rx="10" class="card" />
  <rect x="417" y="292" width="4" height="34" rx="2" fill="#0078d4" />
  <text x="434" y="306" class="small">Network Interface</text>
  <text x="434" y="322" class="tiny">No public IP attached</text>

  <!-- NIC to VM -->
  <line x1="535" y1="334" x2="535" y2="354" stroke="#7a7574" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Ubuntu VM -->
  <rect x="415" y="354" width="240" height="120" rx="10" class="card" />
  <image x="428" y="362" width="48" height="48" href="data:image/svg+xml;base64," />
  <text x="486" y="386" class="small">Ubuntu VM</text>
  <text x="486" y="404" class="tiny">Standard_D2alds_v7 / Ubuntu 22.04</text>
  <text x="486" y="444" class="fault">Deallocated (fault)</text>

  <!-- NSG -->
  <rect x="740" y="156" width="400" height="100" rx="14" class="card" />
  <image x="756" y="168" width="48" height="48" href="data:image/svg+xml;base64," />
  <text x="816" y="192" class="small">Network Security Group</text>
  <text x="816" y="210" class="tiny">Associated with workload subnet</text>
  <text x="816" y="240" class="fault">DenyAllInbound rule (fault)</text>

  <!-- Route Table -->
  <rect x="740" y="274" width="400" height="100" rx="14" class="card" />
  <image x="756" y="286" width="48" height="48" href="data:image/svg+xml;base64," />
  <text x="816" y="310" class="small">Route Table</text>
  <text x="816" y="328" class="tiny">Associated with workload subnet</text>
  <text x="816" y="358" class="fault">Blackhole 0.0.0.0/0 route (fault)</text>

  <!-- Storage Account -->
  <rect x="740" y="392" width="400" height="100" rx="14" class="card" />
  <image x="756" y="404" width="48" height="48" href="data:image/svg+xml;base64," />
  <text x="816" y="428" class="small">Storage Account</text>
  <text x="816" y="446" class="tiny">VM boot diagnostics</text>
  <text x="816" y="476" class="fault">Missing required tags (fault)</text>

  <!-- NSG / RT associations -->
  <path d="M 740 206 L 675 357" class="edge-soft" />
  <text x="700" y="268" class="tiny">associated</text>
  <path d="M 740 324 L 675 400" class="edge-soft" />
  <text x="700" y="356" class="tiny">associated</text>

  <!-- VM to Storage boot diagnostics -->
  <path d="M 655 414 L 740 442" class="edge-soft" />
  <text x="672" y="410" class="tiny">boot diag</text>

  <!-- Shared Resource Group -->
  <rect x="40" y="580" width="1120" height="190" rx="24" class="rg" />
  <text x="78" y="610" class="section">Shared Resource Group</text>
  <text x="78" y="628" class="tiny">rg-{name}-xylem-shared</text>

  <!-- Log Analytics Workspace -->
  <rect x="80" y="648" width="300" height="90" rx="14" class="card" />
  <image x="96" y="660" width="44" height="44" href="data:image/svg+xml;base64," />
  <text x="152" y="682" class="small">Log Analytics Workspace</text>
  <text x="152" y="700" class="tiny">Centralized log collection</text>

  <!-- Data Collection Rule -->
  <rect x="410" y="648" width="300" height="90" rx="14" class="card" />
  <rect x="412" y="660" width="4" height="66" rx="2" fill="#32d4f5" />
  <text x="428" y="682" class="small">Data Collection Rule</text>
  <text x="428" y="700" class="tiny">AMA agent configuration</text>

  <!-- Managed Identity -->
  <rect x="740" y="648" width="300" height="90" rx="14" class="card" />
  <rect x="742" y="660" width="4" height="66" rx="2" fill="#5c2d91" />
  <text x="758" y="682" class="small">Managed Identity</text>
  <text x="758" y="700" class="tiny">Fault injection automation</text>

  <!-- VM to DCR (AMA agent) -->
  <path d="M 535 474 L 535 564 L 560 564 L 560 648" class="edge" />
  <text x="544" y="555" class="tiny">AMA agent</text>

  <!-- DCR to Log Analytics -->
  <path d="M 410 693 L 380 693" class="edge" />
  <text x="386" y="710" class="tiny">data flow</text>

  <text x="70" y="798" class="tiny">Preview only. Editable source: assets/azure-101-lab-topology.drawio</text>
</svg>